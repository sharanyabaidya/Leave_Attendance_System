<style>
/* ============================================================
   LEAVE & ATTENDANCE SYSTEM — STYLES
   Font: Plus Jakarta Sans + JetBrains Mono
   Themes: Light & Dark
   ============================================================ */

/* ---- CSS VARIABLES ---- */
:root {
  --font-main: 'Plus Jakarta Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  /* ACCENT */
  --accent: #4F6EF7;
  --accent-light: #EEF1FF;
  --accent-hover: #3A57E8;
  --accent-soft: rgba(79,110,247,0.12);

  /* SEMANTIC */
  --success: #22C55E;
  --success-bg: #F0FDF4;
  --warning: #F59E0B;
  --warning-bg: #FFFBEB;
  --danger: #EF4444;
  --danger-bg: #FEF2F2;
  --info: #06B6D4;
  --info-bg: #ECFEFF;

  /* RADIUS */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 24px;

  /* TRANSITION */
  --t: all 0.2s ease;
  
  /* SIDEBAR */
  --sidebar-width: 240px;
}

/* LIGHT THEME */
.light-theme {
  --bg: #F5F7FF;
  --bg-card: #FFFFFF;
  --bg-sidebar: #FFFFFF;
  --bg-input: #F8F9FF;
  --border: #E8EAFF;
  --border-strong: #D0D5F0;
  --text: #1A1D3A;
  --text-2: #4A5080;
  --text-3: #8B90B8;
  --shadow: 0 2px 12px rgba(79,110,247,0.08);
  --shadow-md: 0 4px 24px rgba(79,110,247,0.12);
  --shadow-lg: 0 8px 40px rgba(79,110,247,0.16);
}

/* DARK THEME */
.dark-theme {
  --bg: #0F1021;
  --bg-card: #181A2E;
  --bg-sidebar: #141628;
  --bg-input: #1E2040;
  --border: #2A2D50;
  --border-strong: #383C6A;
  --text: #E8EAFF;
  --text-2: #9CA3C8;
  --text-3: #5A5F8A;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
  --accent-light: #1E2448;
  --success-bg: #0D2818;
  --warning-bg: #2A1F00;
  --danger-bg: #2A0D0D;
  --info-bg: #0A2230;
}

/* ---- RESET ---- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: var(--font-main);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; cursor: pointer; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; }
* { transition: background 0.25s, border-color 0.25s, color 0.15s; }

/* ---- HIDDEN UTILITY ---- */
.hidden { display: none !important; }

/* ---- SCREENS ---- */
.screen { min-height: 100vh; }
.screen.hidden { display: none !important; }
.screen.active { display: flex; }

/* ============================================================
   LOGIN
   ============================================================ */
#loginScreen {
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
.login-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
.login-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
}
.light-theme .b1 { width:480px; height:480px; background:#6E8BFF; top:-100px; left:-80px; }
.light-theme .b2 { width:360px; height:360px; background:#B8C8FF; bottom:-60px; right:-60px; }
.light-theme .b3 { width:220px; height:220px; background:#FFD6FF; top:50%; left:50%; transform:translate(-50%,-50%); }
.dark-theme .b1  { width:480px; height:480px; background:#2A3A8C; top:-100px; left:-80px; }
.dark-theme .b2  { width:360px; height:360px; background:#1A2860; bottom:-60px; right:-60px; }
.dark-theme .b3  { width:220px; height:220px; background:#3A1860; top:50%; left:50%; transform:translate(-50%,-50%); }

.login-card {
  position: relative; z-index: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 40px 36px;
  width: 420px;
  max-width: calc(100vw - 32px);
  box-shadow: var(--shadow-lg);
}
.login-logo { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
.logo-icon {
  width:44px; height:44px; border-radius:12px;
  background: var(--accent); color:#fff;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.logo-icon.small { width:32px; height:32px; border-radius:9px; }
.logo-text { display:flex; flex-direction:column; }
.logo-title { font-size:1.1rem; font-weight:800; color:var(--text); letter-spacing:-0.5px; }
.logo-sub { font-size:0.7rem; color:var(--text-3); font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
.login-heading { font-size:1.6rem; font-weight:800; color:var(--text); letter-spacing:-0.5px; margin-bottom:4px; }
.login-desc { font-size:0.85rem; color:var(--text-2); margin-bottom:24px; }
.login-footer { margin-top:20px; text-align:center; }
.theme-toggle-btn {
  font-size:0.8rem; color:var(--text-3); background:none; border:none;
  cursor:pointer; padding:6px 12px; border-radius:20px;
  border:1px solid var(--border); transition:var(--t);
}
.theme-toggle-btn:hover { background:var(--bg); color:var(--text-2); }

/* ============================================================
   FORMS
   ============================================================ */
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:0.8rem; font-weight:600; color:var(--text-2); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.3px; }
.form-group input, .form-group select, .form-group textarea {
  width:100%; padding:11px 14px;
  background: var(--bg-input); border: 1.5px solid var(--border);
  border-radius: var(--r-sm); color: var(--text);
  font-size:0.9rem; outline:none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft);
}
.form-group textarea { min-height:90px; resize:vertical; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.pw-wrap { position:relative; }
.pw-wrap input { padding-right:44px; }
.pw-toggle {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; font-size:16px; opacity:0.5;
}
.pw-toggle:hover { opacity:0.9; }
.error-msg { color:var(--danger); font-size:0.82rem; margin-top:10px; padding:10px 12px; background:var(--danger-bg); border-radius:var(--r-sm); }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn-primary {
  background: var(--accent); color: #fff;
  border-radius: var(--r-sm); padding: 12px 20px;
  font-size: 0.9rem; font-weight: 600;
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 2px 10px rgba(79,110,247,0.35);
}
.btn-primary:hover { background:var(--accent-hover); box-shadow:0 4px 16px rgba(79,110,247,0.45); }
.btn-primary:active { transform:scale(0.98); }
.btn-full { width:100%; }

.btn-secondary {
  background: var(--accent-light); color: var(--accent);
  border-radius: var(--r-sm); padding: 10px 18px;
  font-size: 0.85rem; font-weight: 600;
  display:inline-flex; align-items:center; gap:6px;
  transition:var(--t);
}
.btn-secondary:hover { background:var(--accent-soft); }

.btn-success { background:#22C55E; color:#fff; border-radius:var(--r-sm); padding:8px 16px; font-size:0.82rem; font-weight:600; transition:var(--t); }
.btn-success:hover { background:#16A34A; }
.btn-danger  { background:#EF4444; color:#fff; border-radius:var(--r-sm); padding:8px 16px; font-size:0.82rem; font-weight:600; transition:var(--t); }
.btn-danger:hover  { background:#DC2626; }
.btn-warning { background:#F59E0B; color:#fff; border-radius:var(--r-sm); padding:8px 16px; font-size:0.82rem; font-weight:600; transition:var(--t); }
.btn-sm { padding:6px 12px; font-size:0.78rem; }
.btn-icon { padding:8px; border-radius:var(--r-sm); }

.btn-spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.35); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; }

/* ============================================================
   SIDEBAR
   ============================================================ */
#mainApp { display:flex; min-height:100vh; }
.sidebar {
  width: 240px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; left:0; top:0; bottom:0; z-index:100;
  overflow-y: auto; overflow-x: hidden;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: var(--shadow);
}
.sidebar-header {
  padding:20px 16px 16px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.sidebar-logo { display:flex; align-items:center; gap:10px; }
.sidebar-title { font-weight:800; font-size:0.95rem; color:var(--text); letter-spacing:-0.3px; }
.sidebar-close { display:none; background:none; border:none; font-size:18px; cursor:pointer; color:var(--text-3); }
.sidebar-user {
  padding:16px; display:flex; align-items:center; gap:12px;
  border-bottom:1px solid var(--border); margin-bottom:8px;
}
.user-avatar {
  width:40px; height:40px; border-radius:12px;
  background: linear-gradient(135deg, var(--accent), #8B5CF6);
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:1rem; flex-shrink:0;
}
.user-name { font-weight:700; font-size:0.88rem; color:var(--text); display:block; }
.user-role-badge {
  font-size:0.68rem; font-weight:600; color:var(--accent);
  background:var(--accent-light); padding:2px 8px; border-radius:20px;
  text-transform:uppercase; letter-spacing:0.3px;
}

.nav-section { padding:8px 0; }
.nav-label { font-size:0.65rem; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:0.8px; padding:0 16px 6px; display:block; }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 16px; font-size:0.86rem; font-weight:500; color:var(--text-2);
  border-radius:0; cursor:pointer; transition:var(--t);
  position:relative; border-left:3px solid transparent; width:100%;
}
.nav-item:hover { background:var(--accent-light); color:var(--accent); }
.nav-item.active { background:var(--accent-light); color:var(--accent); border-left-color:var(--accent); font-weight:600; }
.nav-icon { font-size:1rem; width:20px; text-align:center; flex-shrink:0; }
.badge-count {
  margin-left:auto; background:var(--danger); color:#fff;
  font-size:0.7rem; font-weight:700; padding:2px 7px; border-radius:20px;
  min-width:20px; text-align:center;
}
.badge-count:empty, .badge-count[data-count="0"] { display:none; }
.sidebar-footer { margin-top:auto; border-top:1px solid var(--border); padding:8px 0; }
.logout-btn { color:var(--danger) !important; }
.logout-btn:hover { background:var(--danger-bg) !important; }
.theme-nav-btn { color:var(--text-2); }

/* ============================================================
   MAIN CONTENT
   ============================================================ */
.main-content {
  flex:1; margin-left: 240px;
  display:flex; flex-direction:column;
  min-height:100vh;
  transition: margin-left 0.3s cubic-bezier(0.4,0,0.2,1);
}
#mainApp.sidebar-collapsed .sidebar {
  transform: translateX(-240px);
}
#mainApp.sidebar-collapsed .main-content {
  margin-left: 0 !important;
}
.topbar {
  background: var(--bg-card); border-bottom:1px solid var(--border);
  padding:14px 24px; display:flex; align-items:center; gap:16px;
  position:sticky; top:0; z-index:50; box-shadow:var(--shadow);
}
.hamburger { font-size:22px; color:var(--text-2); background:none; border:none; cursor:pointer; display:block; }
.topbar-left { flex:1; }
.page-title { font-size:1.2rem; font-weight:800; color:var(--text); letter-spacing:-0.3px; }
.page-subtitle { font-size:0.78rem; color:var(--text-3); display:block; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.topbar-date { font-size:0.78rem; color:var(--text-3); font-family:var(--font-mono); }
.avatar-sm {
  width:34px; height:34px; border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#8B5CF6);
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:0.85rem;
}
.page-content { flex:1; padding:24px; }

/* ============================================================
   CARDS & LAYOUT
   ============================================================ */
.card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--r-lg); box-shadow:var(--shadow); overflow:hidden;
}
.card-header { padding:18px 20px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.card-title { font-size:0.95rem; font-weight:700; color:var(--text); }
.card-body { padding:20px; }

.stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:16px; margin-bottom:24px; }
.stat-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:20px; box-shadow:var(--shadow);
  display:flex; align-items:flex-start; gap:14px;
  transition:transform 0.2s, box-shadow 0.2s;
}
.stat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
.stat-icon {
  width:44px; height:44px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; flex-shrink:0;
}
.stat-icon.blue   { background:var(--accent-light); }
.stat-icon.green  { background:var(--success-bg); }
.stat-icon.amber  { background:var(--warning-bg); }
.stat-icon.red    { background:var(--danger-bg); }
.stat-icon.purple { background:#F3E8FF; }
.dark-theme .stat-icon.purple { background:#2A1860; }
.stat-info { flex:1; }
.stat-value { font-size:1.7rem; font-weight:800; color:var(--text); letter-spacing:-1px; line-height:1; margin-bottom:4px; font-family:var(--font-mono); }
.stat-label { font-size:0.75rem; color:var(--text-3); font-weight:600; text-transform:uppercase; letter-spacing:0.3px; }
.stat-sub { font-size:0.72rem; color:var(--text-3); margin-top:2px; }

.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }

/* ============================================================
   TABLES
   ============================================================ */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:0.84rem; }
thead th {
  background:var(--bg); color:var(--text-3); font-weight:700;
  text-transform:uppercase; letter-spacing:0.4px; font-size:0.72rem;
  padding:10px 14px; text-align:left; border-bottom:2px solid var(--border);
  white-space:nowrap;
}
tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
tbody tr:hover { background:var(--accent-light); }
tbody td { padding:11px 14px; color:var(--text); vertical-align:middle; }
.no-data { text-align:center; padding:40px; color:var(--text-3); font-size:0.9rem; }

/* ============================================================
   STATUS BADGES
   ============================================================ */
.badge {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 10px; border-radius:20px;
  font-size:0.72rem; font-weight:700; letter-spacing:0.3px; white-space:nowrap;
}
.badge-pending  { background:var(--warning-bg); color:var(--warning); }
.badge-approved { background:var(--success-bg); color:var(--success); }
.badge-rejected { background:var(--danger-bg);  color:var(--danger); }
.badge-info     { background:var(--info-bg);    color:var(--info); }
.badge-neutral  { background:var(--accent-light); color:var(--accent); }

/* ============================================================
   LEAVE BALANCE WIDGET
   ============================================================ */
.leave-balance-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:20px; }
.lb-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--r-md); padding:16px; text-align:center;
  box-shadow:var(--shadow);
}
.lb-number { font-size:2rem; font-weight:800; font-family:var(--font-mono); margin-bottom:4px; }
.lb-label  { font-size:0.72rem; color:var(--text-3); font-weight:600; text-transform:uppercase; letter-spacing:0.3px; }
.lb-accent  { color:var(--accent); }
.lb-success { color:var(--success); }
.lb-warning { color:var(--warning); }
.lb-danger  { color:var(--danger); }
.lb-info    { color:var(--info); }

/* Progress Bar */
.progress-wrap { margin-top:16px; }
.progress-label { display:flex; justify-content:space-between; font-size:0.78rem; color:var(--text-2); margin-bottom:6px; font-weight:500; }
.progress-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent); border-radius:4px; transition:width 0.6s ease; }
.progress-fill.green  { background:var(--success); }
.progress-fill.amber  { background:var(--warning); }
.progress-fill.red    { background:var(--danger); }

/* ============================================================
   ATTENDANCE CALENDAR WIDGET
   ============================================================ */
.att-month-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--r-md); padding:16px; transition:transform 0.2s;
}
.att-month-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
.att-month-name { font-weight:700; font-size:0.88rem; color:var(--text); margin-bottom:12px; display:flex; justify-content:space-between; }
.att-bars { display:flex; gap:4px; align-items:flex-end; height:50px; }
.att-bar { flex:1; border-radius:3px; min-height:6px; }
.att-bar.present  { background:var(--success); }
.att-bar.leave    { background:var(--accent); }
.att-bar.absent   { background:var(--danger); }
.att-bar.medical  { background:var(--info); }
.att-bar.rejected-me { background:var(--warning); }
.att-legends { display:flex; gap:12px; flex-wrap:wrap; margin-top:10px; }
.att-legend { display:flex; align-items:center; gap:5px; font-size:0.72rem; color:var(--text-3); }
.att-legend-dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
.att-stats-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.att-stat-chip {
  background:var(--bg); border:1px solid var(--border);
  border-radius:6px; padding:4px 10px; font-size:0.75rem;
  display:flex; align-items:center; gap:5px; font-weight:600;
}

/* ============================================================
   TIMELINE / ACTIVITY
   ============================================================ */
.timeline { display:flex; flex-direction:column; gap:0; }
.tl-item { display:flex; gap:14px; padding:12px 0; position:relative; }
.tl-item:not(:last-child)::before {
  content:''; position:absolute; left:14px; top:36px; bottom:0; width:2px;
  background:var(--border);
}
.tl-dot {
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:0.7rem; font-weight:700; margin-top:2px; z-index:1;
}
.tl-dot.pending  { background:var(--warning-bg); color:var(--warning); }
.tl-dot.approved { background:var(--success-bg); color:var(--success); }
.tl-dot.rejected { background:var(--danger-bg);  color:var(--danger); }
.tl-content { flex:1; }
.tl-title   { font-weight:600; font-size:0.85rem; color:var(--text); }
.tl-sub     { font-size:0.75rem; color:var(--text-3); margin-top:2px; }

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.5);
  display:flex; align-items:center; justify-content:center;
  z-index:1000; padding:16px; backdrop-filter:blur(4px);
}
.modal-box {
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:var(--r-xl); box-shadow:var(--shadow-lg);
  width:520px; max-width:100%; max-height:90vh; overflow-y:auto;
}
.modal-header {
  padding:20px 24px 16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.modal-header h3 { font-size:1rem; font-weight:700; color:var(--text); }
.modal-header button { color:var(--text-3); font-size:18px; background:none; border:none; cursor:pointer; }
.modal-body { padding:20px 24px; }

/* ============================================================
   TOAST
   ============================================================ */
.toast {
  position:fixed; bottom:24px; right:24px; z-index:9999;
  background:var(--text); color:var(--bg-card);
  padding:12px 20px; border-radius:var(--r-md);
  font-size:0.85rem; font-weight:600; box-shadow:var(--shadow-lg);
  animation:slideUp 0.3s ease;
  max-width:340px;
}
.toast.success { background:var(--success); color:#fff; }
.toast.error   { background:var(--danger);  color:#fff; }
.toast.warning { background:var(--warning); color:#fff; }

/* ============================================================
   LOADING
   ============================================================ */
.loading-screen {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:300px; gap:16px; color:var(--text-3);
}
.loader-ring {
  width:40px; height:40px; border:3px solid var(--border);
